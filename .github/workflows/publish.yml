name: Build and Publish pygeometry

on:
  push:
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install CGAL on Mac
        if: runner.os == 'macOS'
        run: |
          brew install cgal boost

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_ARCHS: auto64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Install CGAL inside Linux container
          CIBW_BEFORE_ALL_LINUX: |
            dnf install -y epel-release
            dnf install -y CGAL-devel boost-devel gmp-devel mpfr-devel

          # Install vcpkg and CGAL inside cibuildwheel Windows environment
          # Checks if vcpkg already exists before cloning to avoid errors
          CIBW_BEFORE_ALL_WINDOWS: |
            if not exist C:/vcpkg git clone https://github.com/microsoft/vcpkg C:/vcpkg
            if not exist C:/vcpkg/vcpkg.exe C:/vcpkg/bootstrap-vcpkg.bat
            C:/vcpkg/vcpkg install cgal:x64-windows

          # Pass cmake toolchain and CGAL paths directly to scikit-build-core
          CIBW_CONFIG_SETTINGS_WINDOWS: "cmake.args=-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake;-DCGAL_DIR=C:/vcpkg/installed/x64-windows/share/cgal"

          CIBW_BEFORE_BUILD: pip install scikit-build-core pybind11

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}