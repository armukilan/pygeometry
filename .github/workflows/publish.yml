name: Build and Publish pygeometry

on:
  push:
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # --------------------------------------------------------
      # Install CGAL on Mac and Windows directly
      # Linux is handled inside the container via CIBW_BEFORE_ALL
      # --------------------------------------------------------
      - name: Install CGAL on Mac
        if: runner.os == 'macOS'
        run: |
          brew install cgal boost

      - name: Install CGAL on Windows
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/microsoft/vcpkg C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
          C:/vcpkg/vcpkg install cgal:x64-windows
        shell: cmd

      # --------------------------------------------------------
      # Build wheels using cibuildwheel
      # --------------------------------------------------------
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_ARCHS: auto64

          # Install CGAL inside the Linux container
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y epel-release && yum install -y CGAL-devel boost-devel || \
            apt-get update && apt-get install -y libcgal-dev libboost-dev

          # Install build dependencies for all platforms
          CIBW_BEFORE_BUILD: pip install scikit-build-core pybind11

      # --------------------------------------------------------
      # Upload built wheels
      # --------------------------------------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ============================================================
  # Publish to PyPI
  # ============================================================
  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}