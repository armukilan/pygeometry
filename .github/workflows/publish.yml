name: Build and Publish pygeometry

on:
  push:
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # --------------------------------------------------------
      # Step 1: Checkout your code from GitHub
      # --------------------------------------------------------
      - uses: actions/checkout@v4

      # --------------------------------------------------------
      # Step 2: Install CGAL on each OS
      # --------------------------------------------------------
      - name: Install CGAL on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcgal-dev libboost-dev

      - name: Install CGAL on Mac
        if: runner.os == 'macOS'
        run: |
          brew install cgal boost

      - name: Install CGAL on Windows
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/microsoft/vcpkg C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
          C:/vcpkg/vcpkg install cgal:x64-windows
        shell: cmd

      # --------------------------------------------------------
      # Step 3: Build wheels using cibuildwheel
      # --------------------------------------------------------
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_ARCHS: auto64
          CIBW_BEFORE_BUILD: pip install scikit-build-core pybind11

      # --------------------------------------------------------
      # Step 4: Upload built wheels as artifacts
      # --------------------------------------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ============================================================
  # Publish to PyPI after all wheels are built
  # ============================================================
  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}