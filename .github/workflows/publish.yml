name: Build and Publish pycglib
on:
  push:
    tags:
      - "v*"
jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install CGAL on Mac
        if: runner.os == 'macOS'
        run: |
          brew install cgal boost

      - name: Install CGAL on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Force fresh vcpkg install every time
          if (Test-Path "C:/vcpkg") {
            Remove-Item -Recurse -Force "C:/vcpkg"
          }
          git clone https://github.com/microsoft/vcpkg C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
          C:/vcpkg/vcpkg install cgal:x64-windows
          # Verify installation
          Write-Host "=== Installed packages ==="
          Get-ChildItem C:/vcpkg/installed/x64-windows/share/ | Where-Object { $_.Name -like "*cgal*" }
          Write-Host "=== CGALConfig.cmake location ==="
          Get-ChildItem -Recurse C:/vcpkg/installed/ -Filter "CGALConfig.cmake" | Select-Object FullName

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-* 
          # Add cp314-* after stable release
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          CIBW_ARCHS: auto64
          # CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28 (Original)
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_34

          # Install CGAL inside Linux container (Original)
          # CIBW_BEFORE_ALL_LINUX: |
          #   dnf install -y epel-release
          #   dnf install -y CGAL-devel boost-devel gmp-devel mpfr-devel
          #   rpm -q CGAL-devel


          CIBW_BEFORE_ALL_LINUX: |
            dnf install -y epel-release
            dnf install -y boost-devel gmp-devel mpfr-devel
            curl -L https://github.com/CGAL/cgal/releases/download/v6.0.1/CGAL-6.0.1-library.tar.xz | tar -xJ -C /usr/local --strip-components=1
          # # echo "=== CGAL version header ==="
          # cat /usr/local/include/CGAL/version.h | grep CGAL_VERSION_STR
          # echo "=== Multipolygon header exists? ==="
          # ls /usr/local/include/CGAL/Multipolygon_with_holes_2.h || echo "NOT FOUND"
          # echo "=== Any old CGAL installed? ==="
          # find /usr -name "CGALConfig.cmake" 2>/dev/null

          # Set Windows environment so cmake can find CGAL
          # Uses CMAKE_PREFIX_PATH instead of CGAL_DIR for more reliable detection
          CIBW_ENVIRONMENT_WINDOWS: >-
            CMAKE_PREFIX_PATH="C:/vcpkg/installed/x64-windows"
            CMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"

          # macOS deployment target set to 15.0
          # Supported: macOS 15.0 (Sequoia) and above
          # Excluded: macOS 14.0 (Sonoma) and older
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15.0
          MACOSX_DEPLOYMENT_TARGET: "15.0"

          CIBW_BEFORE_BUILD: pip install scikit-build-core pybind11

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    # if: always()
    if: success()
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false